<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard – MDR Bikes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #4c6fc9; --gold-light: #b8ef23;
    --dark: #0D0D0D; --dark-2: #141414; --dark-3: #0a0909; --dark-4: #252525;
    --text: #bbef8d; --text-muted: #8d6941; --border: rgba(201,168,76,0.2);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--dark); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 5%;
    background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; color: var(--gold); text-decoration: none; }
  .logo span { color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 1.5rem; }
  .nav-user { font-size: 0.8rem; color: var(--text-muted); }
  .nav-user strong { color: var(--text); }
  .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.45rem 1.1rem; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn-logout:hover { border-color: #e07070; color: #e07070; }

  /* LAYOUT */
  .page { padding: 2.5rem 5%; max-width: 1200px; margin: 0 auto; }

  /* WELCOME */
  .welcome-bar { margin-bottom: 2.5rem; }
  .welcome-tag { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .welcome-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; }
  .welcome-title em { color: var(--gold); font-style: normal; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 2.5rem; }
  .stat-box { background: var(--dark-2); border: 1px solid var(--border); padding: 1.5rem; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 0.4rem; }

  /* SECTION */
  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.8rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; }
  .section-title em { color: var(--gold); font-style: normal; }

  /* ORDERS */
  .orders-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .order-row {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1.2fr;
    align-items: center; padding: 1.1rem 1.4rem; gap: 1rem;
    background: var(--dark-2); transition: background 0.2s;
  }
  .order-row:hover { background: var(--dark-4); }
  .order-row.header { background: var(--dark-3); }
  .order-row.header span { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .order-bike { font-size: 0.9rem; font-weight: 500; }
  .order-type { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }
  .order-date { font-size: 0.8rem; color: var(--text-muted); }
  .order-amount { font-size: 0.9rem; color: var(--gold); font-weight: 500; }
  .badge {
    display: inline-block; padding: 0.3rem 0.7rem;
    font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
  }
  .badge-pending   { background: rgba(201,168,76,0.15); color: #C9A84C; }
  .badge-confirmed { background: rgba(76,111,201,0.15); color: var(--gold); }
  .badge-processing{ background: rgba(111,76,201,0.15); color: #a07cd4; }
  .badge-ready     { background: rgba(76,180,111,0.15); color: #5cb98a; }
  .badge-delivered { background: rgba(76,180,76,0.12); color: #7dc97d; }
  .badge-cancelled { background: rgba(200,76,76,0.12); color: #c97d7d; }

  /* TRACKING */
  .track-box { background: var(--dark-2); border: 1px solid var(--border); padding: 1.5rem; margin-top: 1rem; display: none; }
  .track-box.open { display: block; }
  .track-steps { display: flex; gap: 0; position: relative; margin-top: 1rem; overflow-x: auto; padding-bottom: 0.5rem; }
  .track-step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 80px; position: relative; }
  .track-step::before {
    content: ''; position: absolute; top: 14px; left: 50%; width: 100%;
    height: 2px; background: var(--border);
  }
  .track-step:last-child::before { display: none; }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--dark-3); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; position: relative; z-index: 1; transition: all 0.3s;
  }
  .step-dot.done { background: var(--gold); border-color: var(--gold); color: var(--dark); }
  .step-dot.active { background: var(--dark); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 0 4px rgba(76,111,201,0.2); }
  .step-label { font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-top: 0.5rem; text-align: center; }

  /* BROWSE */
  .bikes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1px; background: var(--border); margin-top: 1rem; }
  .bike-card { background: var(--dark-2); padding: 1.4rem; cursor: pointer; transition: background 0.2s; position: relative; }
  .bike-card:hover { background: var(--dark-4); }
  .bike-tag { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; background: var(--gold); color: var(--dark); padding: 0.25rem 0.6rem; font-weight: 600; display: inline-block; margin-bottom: 0.8rem; }
  .bike-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
  .bike-type { font-size: 0.75rem; color: var(--text-muted); }
  .bike-price { font-size: 1rem; color: var(--gold); font-weight: 500; margin-top: 0.8rem; }
  .btn-order {
    width: 100%; margin-top: 1rem; padding: 0.6rem;
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; transition: all 0.3s;
  }
  .btn-order:hover { background: var(--gold); color: var(--dark); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--dark-2); border: 1px solid var(--border); padding: 2rem; width: 100%; max-width: 440px; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }
  .modal-title em { color: var(--gold); font-style: normal; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  .form-group label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .form-group input, .form-group textarea, .form-group select {
    background: var(--dark-3); border: 1px solid var(--border); color: var(--text);
    padding: 0.7rem 0.9rem; font-family: 'Jost', sans-serif; font-size: 0.88rem;
    outline: none; transition: border-color 0.3s; -webkit-appearance: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); }
  .form-group textarea { height: 90px; resize: none; }
  .modal-actions { display: flex; gap: 1rem; margin-top: 0.5rem; }
  .btn-primary { flex: 1; padding: 0.8rem; background: var(--gold); border: none; color: var(--dark); font-family: 'Jost', sans-serif; font-size: 0.82rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-cancel { flex: 1; padding: 0.8rem; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'Jost', sans-serif; font-size: 0.82rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn-cancel:hover { border-color: #e07070; color: #e07070; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 3rem; color: var(--text-muted); }
  .empty p { font-size: 0.9rem; }

  /* MSG */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
    padding: 1rem 1.5rem; background: var(--dark-2); border: 1px solid var(--gold);
    font-size: 0.85rem; color: var(--text);
    animation: slideIn 0.3s ease both;
    display: none;
  }
  .toast.show { display: block; }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }

  /* LOADING */
  .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }

  @media (max-width:700px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .order-row { grid-template-columns: 1fr 1fr; }
    .order-row .order-amount { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="Bikes.html" class="logo">MDR <span>Bikes</span></a>
  <div class="nav-right">
    <span class="nav-user">Hello, <strong id="nav-name">—</strong></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">

  <!-- WELCOME -->
  <div class="welcome-bar">
    <div class="welcome-tag">Customer Dashboard</div>
    <h1 class="welcome-title">Your Riding <em>Journey.</em></h1>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-active">—</div>
      <div class="stat-label">Active Orders</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-delivered">—</div>
      <div class="stat-label">Delivered</div>
    </div>
  </div>

  <!-- ORDERS -->
  <div class="section-head">
    <h2 class="section-title">My <em>Orders</em></h2>
  </div>
  <div id="orders-container" class="loading">Loading your orders…</div>

  <!-- BROWSE BIKES -->
  <div class="section-head" style="margin-top:3rem;">
    <h2 class="section-title">Browse <em>Collection</em></h2>
  </div>
  <div id="bikes-container" class="loading">Loading bikes…</div>

</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <h3 class="modal-title">Order — <em id="modal-bike-name">Bike</em></h3>
    <input type="hidden" id="modal-bike-id" />
    <div class="form-group">
      <label>Order Type</label>
      <select id="modal-type">
        <option value="purchase">Purchase</option>
        <option value="service">Servicing</option>
        <option value="accessory">Accessories</option>
      </select>
    </div>
    <div class="form-group">
      <label>Delivery Address</label>
      <input type="text" id="modal-address" placeholder="Your full address" />
    </div>
    <div class="form-group">
      <label>Contact Phone</label>
      <input type="tel" id="modal-phone" placeholder="+91 98765 43210" />
    </div>
    <div class="form-group">
      <label>Message / Notes</label>
      <textarea id="modal-message" placeholder="Any specific requirements?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="placeOrder()">Place Order</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = 'https://your-backend.railway.app'; // 🔁 Replace with Railway URL

  // ── AUTH GUARD ──
  const token = localStorage.getItem('mdr_token');
  const user  = JSON.parse(localStorage.getItem('mdr_user') || 'null');
  if (!token || !user) { window.location.href = 'login.html'; }
  if (user?.role === 'admin') { window.location.href = 'admin.html'; }

  document.getElementById('nav-name').textContent = user?.name || 'Rider';

  const STATUS_ORDER = ['pending','confirmed','processing','ready','delivered'];

  function logout() {
    localStorage.removeItem('mdr_token');
    localStorage.removeItem('mdr_user');
    window.location.href = 'login.html';
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function badgeClass(status) {
    const map = { pending:'badge-pending', confirmed:'badge-confirmed', processing:'badge-processing', ready:'badge-ready', delivered:'badge-delivered', cancelled:'badge-cancelled' };
    return map[status] || 'badge-pending';
  }

  function fmt(n) {
    return '₹' + Number(n).toLocaleString('en-IN');
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  // ── LOAD ORDERS ──
  async function loadOrders() {
    const cont = document.getElementById('orders-container');
    try {
      const res = await fetch(`${API}/api/orders/my`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      const orders = data.orders;
      document.getElementById('stat-total').textContent = orders.length;
      document.getElementById('stat-active').textContent = orders.filter(o => !['delivered','cancelled'].includes(o.status)).length;
      document.getElementById('stat-delivered').textContent = orders.filter(o => o.status === 'delivered').length;

      if (!orders.length) {
        cont.innerHTML = '<div class="empty"><p>No orders yet. Browse our collection below!</p></div>';
        return;
      }

      cont.innerHTML = `
        <div class="orders-list">
          <div class="order-row header">
            <span>Bike</span><span>Date</span><span>Status</span><span>Amount</span>
          </div>
          ${orders.map(o => `
            <div class="order-row" onclick="toggleTrack('track-${o._id}', '${o.status}')">
              <div>
                <div class="order-bike">${o.bike?.name || '—'}</div>
                <div class="order-type">${o.orderType}</div>
              </div>
              <div class="order-date">${fmtDate(o.createdAt)}</div>
              <div><span class="badge ${badgeClass(o.status)}">${o.status}</span></div>
              <div class="order-amount">${fmt(o.amount)}</div>
            </div>
            <div class="track-box" id="track-${o._id}">
              <p style="font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.5rem">Order Tracking</p>
              <div class="track-steps">
                ${STATUS_ORDER.map(s => {
                  const idx = STATUS_ORDER.indexOf(s);
                  const cur = STATUS_ORDER.indexOf(o.status);
                  const cls = idx < cur ? 'done' : idx === cur ? 'active' : '';
                  return `<div class="track-step"><div class="step-dot ${cls}">${idx < cur ? '✓' : idx+1}</div><div class="step-label">${s}</div></div>`;
                }).join('')}
              </div>
            </div>
          `).join('')}
        </div>`;
    } catch (err) {
      cont.innerHTML = `<div class="empty"><p>Could not load orders: ${err.message}</p></div>`;
    }
  }

  function toggleTrack(id, status) {
    if (status === 'cancelled') return;
    const el = document.getElementById(id);
    el.classList.toggle('open');
  }

  // ── LOAD BIKES ──
  async function loadBikes() {
    const cont = document.getElementById('bikes-container');
    try {
      const res = await fetch(`${API}/api/bikes`);
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      if (!data.bikes.length) {
        cont.innerHTML = '<div class="empty"><p>No bikes available right now. Check back soon!</p></div>';
        return;
      }

      cont.innerHTML = `<div class="bikes-grid">
        ${data.bikes.map(b => `
          <div class="bike-card">
            <span class="bike-tag">${b.type}</span>
            <div class="bike-name">${b.name}</div>
            <div class="bike-type">${b.category}</div>
            <div class="bike-price">${fmt(b.price)}</div>
            <button class="btn-order" onclick="openModal('${b._id}', '${b.name}')">Enquire / Order</button>
          </div>
        `).join('')}
      </div>`;
    } catch (err) {
      cont.innerHTML = `<div class="empty"><p>Could not load bikes: ${err.message}</p></div>`;
    }
  }

  // ── ORDER MODAL ──
  function openModal(id, name) {
    document.getElementById('modal-bike-id').value = id;
    document.getElementById('modal-bike-name').textContent = name;
    document.getElementById('order-modal').classList.add('open');
  }
  function closeModal() { document.getElementById('order-modal').classList.remove('open'); }

  async function placeOrder() {
    const bikeId = document.getElementById('modal-bike-id').value;
    const orderType = document.getElementById('modal-type').value;
    const address = document.getElementById('modal-address').value.trim();
    const contactPhone = document.getElementById('modal-phone').value.trim();
    const message = document.getElementById('modal-message').value.trim();

    try {
      const res = await fetch(`${API}/api/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ bikeId, orderType, address, contactPhone, message }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      closeModal();
      toast('Order placed successfully! 🏍️');
      loadOrders();
    } catch (err) {
      toast(`Error: ${err.message}`);
    }
  }

  // ── INIT ──
  loadOrders();
  loadBikes();
</script>
</body>
</html>
