<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel – MDR Bikes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #4c6fc9; --gold-light: #b8ef23;
    --dark: #0D0D0D; --dark-2: #141414; --dark-3: #0a0909; --dark-4: #252525;
    --text: #bbef8d; --text-muted: #8d6941; --border: rgba(201,168,76,0.2);
  }
  body { background: var(--dark); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 5%;
    background: rgba(13,13,13,0.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; color: var(--gold); text-decoration: none; }
  .logo span { color: var(--text); }
  .admin-badge { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; background: rgba(76,111,201,0.15); border: 1px solid var(--border); color: var(--gold); padding: 0.3rem 0.7rem; }
  .nav-right { display: flex; align-items: center; gap: 1.5rem; }
  .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.45rem 1.1rem; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn-logout:hover { border-color: #e07070; color: #e07070; }

  /* SIDEBAR + MAIN */
  .layout { display: flex; min-height: calc(100vh - 60px); }
  .sidebar {
    width: 220px; background: var(--dark-2); border-right: 1px solid var(--border);
    padding: 2rem 0; flex-shrink: 0; position: sticky; top: 60px; height: calc(100vh - 60px);
  }
  .sidebar-item {
    display: block; padding: 0.9rem 1.5rem; font-size: 0.8rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted); cursor: pointer; border: none;
    background: transparent; width: 100%; text-align: left; transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover { color: var(--text); background: var(--dark-4); }
  .sidebar-item.active { color: var(--gold); border-left-color: var(--gold); background: var(--dark-4); }

  .main { flex: 1; padding: 2.5rem 3rem; overflow-y: auto; }

  /* PAGE SECTIONS */
  .panel { display: none; }
  .panel.active { display: block; }

  .page-tag { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem; }
  .page-title em { color: var(--gold); font-style: normal; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.2rem; margin-bottom: 2.5rem; }
  .stat-card { background: var(--dark-2); border: 1px solid var(--border); padding: 1.4rem; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 0.4rem; }

  /* TABLES */
  .table-wrap { background: var(--dark-2); border: 1px solid var(--border); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--dark-3); }
  th { padding: 0.9rem 1.2rem; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-align: left; }
  td { padding: 1rem 1.2rem; font-size: 0.85rem; border-top: 1px solid var(--border); }
  tr:hover td { background: var(--dark-4); }

  .badge { display: inline-block; padding: 0.28rem 0.6rem; font-size: 0.63rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
  .badge-pending   { background: rgba(201,168,76,0.15); color: #C9A84C; }
  .badge-confirmed { background: rgba(76,111,201,0.15); color: var(--gold); }
  .badge-processing{ background: rgba(111,76,201,0.15); color: #a07cd4; }
  .badge-ready     { background: rgba(76,180,111,0.15); color: #5cb98a; }
  .badge-delivered { background: rgba(76,180,76,0.12); color: #7dc97d; }
  .badge-cancelled { background: rgba(200,76,76,0.12); color: #c97d7d; }
  .badge-available { background: rgba(76,180,76,0.12); color: #7dc97d; }
  .badge-sold      { background: rgba(200,76,76,0.12); color: #c97d7d; }

  /* ACTION BUTTONS */
  .btn-sm {
    padding: 0.35rem 0.9rem; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase;
    border: 1px solid var(--border); background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.2s; margin-right: 0.4rem;
  }
  .btn-sm:hover { border-color: var(--gold); color: var(--gold); }
  .btn-sm.danger:hover { border-color: #e07070; color: #e07070; }

  /* SELECT */
  select.status-sel {
    background: var(--dark-3); border: 1px solid var(--border); color: var(--text);
    padding: 0.35rem 0.7rem; font-family: 'Jost', sans-serif; font-size: 0.8rem;
    outline: none; cursor: pointer; -webkit-appearance: none;
  }

  /* TOOLBAR */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.8rem; }
  .btn-add {
    background: var(--gold); border: none; color: var(--dark);
    padding: 0.6rem 1.4rem; font-family: 'Jost', sans-serif; font-size: 0.78rem;
    font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s;
  }
  .btn-add:hover { background: var(--gold-light); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--dark-2); border: 1px solid var(--border); padding: 2rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 1.5rem; }
  .modal-title em { color: var(--gold); font-style: normal; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  .form-group label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--dark-3); border: 1px solid var(--border); color: var(--text);
    padding: 0.7rem 0.9rem; font-family: 'Jost', sans-serif; font-size: 0.88rem;
    outline: none; transition: border-color 0.3s; -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .modal-actions { display: flex; gap: 1rem; margin-top: 0.5rem; }
  .btn-primary { flex:1; padding: 0.75rem; background: var(--gold); border: none; color: var(--dark); font-family: 'Jost', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-cancel { flex:1; padding: 0.75rem; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'Jost', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn-cancel:hover { border-color: #e07070; color: #e07070; }

  /* TOAST */
  .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 300; padding: 1rem 1.5rem; background: var(--dark-2); border: 1px solid var(--gold); font-size: 0.85rem; display: none; }
  .toast.show { display: block; }

  /* LOADING */
  .loading { padding: 2rem; color: var(--text-muted); font-size: 0.85rem; text-align: center; }
  .empty { padding: 2.5rem; text-align: center; color: var(--text-muted); font-size: 0.88rem; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:1rem;">
    <a href="Bikes.html" class="logo">MDR <span>Bikes</span></a>
    <span class="admin-badge">Admin</span>
  </div>
  <div class="nav-right">
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="sidebar-item active" onclick="showPanel('overview')">Overview</button>
    <button class="sidebar-item" onclick="showPanel('orders')">Orders</button>
    <button class="sidebar-item" onclick="showPanel('bikes')">Manage Bikes</button>
    <button class="sidebar-item" onclick="showPanel('customers')">Customers</button>
  </aside>

  <main class="main">

    <!-- OVERVIEW -->
    <div id="panel-overview" class="panel active">
      <div class="page-tag">Admin Dashboard</div>
      <h1 class="page-title">Business <em>Overview</em></h1>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="ov-orders">—</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-num" id="ov-pending">—</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-num" id="ov-delivered">—</div><div class="stat-label">Delivered</div></div>
        <div class="stat-card"><div class="stat-num" id="ov-revenue">—</div><div class="stat-label">Revenue</div></div>
      </div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1rem;">Recent <em style="color:var(--gold);font-style:normal;">Orders</em></h2>
      <div id="recent-orders" class="loading">Loading…</div>
    </div>

    <!-- ORDERS -->
    <div id="panel-orders" class="panel">
      <div class="page-tag">Order Management</div>
      <h1 class="page-title">All <em>Orders</em></h1>
      <div class="toolbar">
        <select id="status-filter" onchange="loadOrders()" style="background:var(--dark-3);border:1px solid var(--border);color:var(--text);padding:0.5rem 1rem;font-family:'Jost',sans-serif;font-size:0.8rem;outline:none;-webkit-appearance:none;">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="processing">Processing</option>
          <option value="ready">Ready</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div id="orders-table" class="loading">Loading orders…</div>
    </div>

    <!-- BIKES -->
    <div id="panel-bikes" class="panel">
      <div class="page-tag">Inventory</div>
      <h1 class="page-title">Manage <em>Bikes</em></h1>
      <div class="toolbar">
        <span style="font-size:0.8rem;color:var(--text-muted);">Total inventory</span>
        <button class="btn-add" onclick="openBikeModal()">+ Add Bike</button>
      </div>
      <div id="bikes-table" class="loading">Loading bikes…</div>
    </div>

    <!-- CUSTOMERS -->
    <div id="panel-customers" class="panel">
      <div class="page-tag">Users</div>
      <h1 class="page-title">Customer <em>List</em></h1>
      <div id="customers-table" class="loading">Loading customers…</div>
    </div>

  </main>
</div>

<!-- ORDER STATUS MODAL -->
<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <h3 class="modal-title">Update <em>Order Status</em></h3>
    <input type="hidden" id="status-order-id" />
    <div class="form-group">
      <label>New Status</label>
      <select id="new-status">
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="processing">Processing</option>
        <option value="ready">Ready for Pickup / Delivery</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" id="status-note" placeholder="e.g. Payment received, dispatched via courier" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('status-modal')">Cancel</button>
      <button class="btn-primary" onclick="updateStatus()">Update</button>
    </div>
  </div>
</div>

<!-- BIKE ADD/EDIT MODAL -->
<div class="modal-overlay" id="bike-modal">
  <div class="modal">
    <h3 class="modal-title" id="bike-modal-title">Add <em>Bike</em></h3>
    <input type="hidden" id="bike-edit-id" />
    <div class="form-row">
      <div class="form-group">
        <label>Bike Name</label>
        <input type="text" id="b-name" placeholder="MDR Velocity" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="b-type">
          <option value="Road">Road</option>
          <option value="Mountain">Mountain</option>
          <option value="Electric">Electric</option>
          <option value="Sport">Sport</option>
          <option value="Cruiser">Cruiser</option>
          <option value="Urban">Urban</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="b-category">
          <option value="bicycle">Bicycle</option>
          <option value="motorcycle">Motorcycle</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" id="b-price" placeholder="45000" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Stock</label>
        <input type="number" id="b-stock" placeholder="1" />
      </div>
      <div class="form-group">
        <label>Available?</label>
        <select id="b-available">
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="text" id="b-image" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="b-desc" placeholder="Short description…" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('bike-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveBike()">Save Bike</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = 'https://your-backend.railway.app'; // 🔁 Replace with Railway URL
  const token = localStorage.getItem('mdr_token');
  const user  = JSON.parse(localStorage.getItem('mdr_user') || 'null');

  if (!token || !user) window.location.href = 'login.html';
  if (user?.role !== 'admin') window.location.href = 'dashboard.html';

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }
  function toast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }
  function fmtDate(d) { return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }
  function badgeHtml(status) {
    const map = { pending:'badge-pending', confirmed:'badge-confirmed', processing:'badge-processing', ready:'badge-ready', delivered:'badge-delivered', cancelled:'badge-cancelled' };
    return `<span class="badge ${map[status]||''}">${status}</span>`;
  }

  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'orders') loadOrders();
    if (name === 'bikes') loadBikes();
    if (name === 'customers') loadCustomers();
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function openModal(id) { document.getElementById(id).classList.add('open'); }

  // ── OVERVIEW ──
  async function loadOverview() {
    try {
      const res = await fetch(`${API}/api/orders/stats/summary`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) {
        document.getElementById('ov-orders').textContent = data.stats.totalOrders;
        document.getElementById('ov-pending').textContent = data.stats.pending;
        document.getElementById('ov-delivered').textContent = data.stats.delivered;
        document.getElementById('ov-revenue').textContent = fmt(data.stats.revenue);
      }

      const oRes = await fetch(`${API}/api/orders?limit=5`, { headers: { Authorization: `Bearer ${token}` } });
      const oData = await oRes.json();
      const recent = oData.orders?.slice(0, 5) || [];

      document.getElementById('recent-orders').innerHTML = recent.length
        ? `<div class="table-wrap"><table>
            <thead><tr><th>Customer</th><th>Bike</th><th>Status</th><th>Amount</th><th>Date</th></tr></thead>
            <tbody>${recent.map(o => `<tr>
              <td>${o.customer?.name || '—'}</td>
              <td>${o.bike?.name || '—'}</td>
              <td>${badgeHtml(o.status)}</td>
              <td>${fmt(o.amount)}</td>
              <td>${fmtDate(o.createdAt)}</td>
            </tr>`).join('')}</tbody>
          </table></div>`
        : '<div class="empty">No orders yet.</div>';
    } catch (err) { console.error(err); }
  }

  // ── ORDERS ──
  async function loadOrders() {
    const filter = document.getElementById('status-filter')?.value || '';
    const url = `${API}/api/orders${filter ? `?status=${filter}` : ''}`;
    document.getElementById('orders-table').innerHTML = '<div class="loading">Loading…</div>';
    try {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const orders = data.orders || [];
      document.getElementById('orders-table').innerHTML = orders.length
        ? `<div class="table-wrap"><table>
            <thead><tr><th>Customer</th><th>Bike</th><th>Type</th><th>Status</th><th>Amount</th><th>Date</th><th>Action</th></tr></thead>
            <tbody>${orders.map(o => `<tr>
              <td>${o.customer?.name || '—'}<br><span style="font-size:0.75rem;color:var(--text-muted)">${o.customer?.email||''}</span></td>
              <td>${o.bike?.name || '—'}</td>
              <td style="font-size:0.75rem;color:var(--text-muted)">${o.orderType}</td>
              <td>${badgeHtml(o.status)}</td>
              <td>${fmt(o.amount)}</td>
              <td>${fmtDate(o.createdAt)}</td>
              <td><button class="btn-sm" onclick="openStatusModal('${o._id}','${o.status}')">Update</button></td>
            </tr>`).join('')}</tbody>
          </table></div>`
        : '<div class="empty">No orders found.</div>';
    } catch (err) { document.getElementById('orders-table').innerHTML = `<div class="empty">Error: ${err.message}</div>`; }
  }

  function openStatusModal(id, current) {
    document.getElementById('status-order-id').value = id;
    document.getElementById('new-status').value = current;
    document.getElementById('status-note').value = '';
    openModal('status-modal');
  }

  async function updateStatus() {
    const id = document.getElementById('status-order-id').value;
    const status = document.getElementById('new-status').value;
    const note = document.getElementById('status-note').value.trim();
    try {
      const res = await fetch(`${API}/api/orders/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status, note }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      closeModal('status-modal');
      toast(`Order marked as "${status}"`);
      loadOrders();
    } catch (err) { toast(`Error: ${err.message}`); }
  }

  // ── BIKES ──
  async function loadBikes() {
    document.getElementById('bikes-table').innerHTML = '<div class="loading">Loading…</div>';
    try {
      const res = await fetch(`${API}/api/bikes/all`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const bikes = data.bikes || [];
      document.getElementById('bikes-table').innerHTML = bikes.length
        ? `<div class="table-wrap"><table>
            <thead><tr><th>Name</th><th>Type</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${bikes.map(b => `<tr>
              <td>${b.name}</td>
              <td><span class="badge badge-pending">${b.type}</span></td>
              <td style="font-size:0.78rem;color:var(--text-muted)">${b.category}</td>
              <td>${fmt(b.price)}</td>
              <td>${b.stock}</td>
              <td>${b.available ? '<span class="badge badge-available">Available</span>' : '<span class="badge badge-sold">Hidden</span>'}</td>
              <td>
                <button class="btn-sm" onclick="editBike(${JSON.stringify(b).split('"').join("'")})">Edit</button>
                <button class="btn-sm danger" onclick="deleteBike('${b._id}')">Delete</button>
              </td>
            </tr>`).join('')}</tbody>
          </table></div>`
        : '<div class="empty">No bikes in inventory. Add one!</div>';
    } catch (err) { document.getElementById('bikes-table').innerHTML = `<div class="empty">Error: ${err.message}</div>`; }
  }

  function openBikeModal(clear = true) {
    if (clear) {
      document.getElementById('bike-edit-id').value = '';
      document.getElementById('bike-modal-title').innerHTML = 'Add <em>Bike</em>';
      ['b-name','b-price','b-stock','b-image','b-desc'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('b-type').value = 'Road';
      document.getElementById('b-category').value = 'bicycle';
      document.getElementById('b-available').value = 'true';
    }
    openModal('bike-modal');
  }

  function editBike(b) {
    document.getElementById('bike-edit-id').value = b._id;
    document.getElementById('bike-modal-title').innerHTML = 'Edit <em>Bike</em>';
    document.getElementById('b-name').value = b.name || '';
    document.getElementById('b-type').value = b.type || 'Road';
    document.getElementById('b-category').value = b.category || 'bicycle';
    document.getElementById('b-price').value = b.price || '';
    document.getElementById('b-stock').value = b.stock || 1;
    document.getElementById('b-available').value = b.available ? 'true' : 'false';
    document.getElementById('b-image').value = b.imageUrl || '';
    document.getElementById('b-desc').value = b.description || '';
    openModal('bike-modal');
  }

  async function saveBike() {
    const id = document.getElementById('bike-edit-id').value;
    const payload = {
      name: document.getElementById('b-name').value.trim(),
      type: document.getElementById('b-type').value,
      category: document.getElementById('b-category').value,
      price: Number(document.getElementById('b-price').value),
      stock: Number(document.getElementById('b-stock').value) || 1,
      available: document.getElementById('b-available').value === 'true',
      imageUrl: document.getElementById('b-image').value.trim(),
      description: document.getElementById('b-desc').value.trim(),
    };
    if (!payload.name || !payload.price) return toast('Name and price are required.');
    try {
      const res = await fetch(id ? `${API}/api/bikes/${id}` : `${API}/api/bikes`, {
        method: id ? 'PATCH' : 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      closeModal('bike-modal');
      toast(id ? 'Bike updated!' : 'Bike added!');
      loadBikes();
    } catch (err) { toast(`Error: ${err.message}`); }
  }

  async function deleteBike(id) {
    if (!confirm('Delete this bike? This cannot be undone.')) return;
    try {
      const res = await fetch(`${API}/api/bikes/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      toast('Bike deleted.');
      loadBikes();
    } catch (err) { toast(`Error: ${err.message}`); }
  }

  // ── CUSTOMERS ──
  async function loadCustomers() {
    // Note: Requires a /api/admin/users route (add if needed)
    document.getElementById('customers-table').innerHTML = '<div class="empty">Customer listing requires a /api/admin/users route. Add it to routes/auth.js as needed.</div>';
  }

  // ── INIT ──
  loadOverview();
</script>
</body>
</html>
