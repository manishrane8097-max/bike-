<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – MDR Bikes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #4c6fc9;
    --gold-light: #b8ef23;
    --dark: #0D0D0D;
    --dark-2: #141414;
    --dark-3: #0a0909;
    --dark-4: #252525;
    --text: #bbef8d;
    --text-muted: #8d6941;
    --border: rgba(201,168,76,0.2);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 5%;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 900;
    letter-spacing: 2px; color: var(--gold);
    text-decoration: none;
  }
  .logo span { color: var(--text); }
  .nav-back {
    font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); text-decoration: none; transition: color 0.3s;
  }
  .nav-back:hover { color: var(--gold); }

  /* MAIN */
  main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 7rem 1.5rem 3rem;
    position: relative; overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .bg-glow {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 50% 60% at 50% 40%, rgba(76,111,201,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* CARD */
  .auth-card {
    position: relative; z-index: 2;
    width: 100%; max-width: 460px;
    background: var(--dark-2);
    border: 1px solid var(--border);
    padding: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .auth-badge {
    display: inline-block;
    font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); border: 1px solid var(--border);
    padding: 0.35rem 0.9rem; margin-bottom: 1.5rem;
  }
  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700; line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .auth-title em { color: var(--gold); font-style: normal; }
  .auth-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; }

  /* TABS */
  .tabs {
    display: flex; gap: 0; margin-bottom: 2rem;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 0.75rem;
    background: transparent; border: none;
    color: var(--text-muted); cursor: pointer;
    font-family: 'Jost', sans-serif; font-size: 0.8rem;
    letter-spacing: 2px; text-transform: uppercase;
    transition: all 0.3s;
  }
  .tab-btn.active {
    background: var(--gold); color: var(--dark); font-weight: 600;
  }
  .tab-btn:not(.active):hover { color: var(--gold); }

  /* FORM */
  .form-panel { display: none; }
  .form-panel.active { display: flex; flex-direction: column; gap: 1.1rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.45rem; }
  .form-group label {
    font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted);
  }
  .form-group input {
    background: var(--dark-3); border: 1px solid var(--border);
    color: var(--text); padding: 0.75rem 1rem;
    font-family: 'Jost', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.3s;
  }
  .form-group input:focus { border-color: var(--gold); }
  .form-group input::placeholder { color: var(--text-muted); opacity: 0.6; }

  /* PASSWORD WRAPPER */
  .pw-wrap { position: relative; }
  .pw-wrap input { width: 100%; padding-right: 3rem; }
  .pw-toggle {
    position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 1rem; transition: color 0.3s;
  }
  .pw-toggle:hover { color: var(--gold); }

  /* SUBMIT */
  .btn-submit {
    width: 100%; padding: 0.9rem;
    background: var(--gold); border: none; color: var(--dark);
    font-family: 'Jost', sans-serif; font-size: 0.85rem;
    font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.3s; margin-top: 0.5rem;
  }
  .btn-submit:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* MESSAGES */
  .msg {
    padding: 0.8rem 1rem; font-size: 0.85rem; display: none;
    margin-bottom: 0.5rem;
  }
  .msg.error { background: rgba(200,50,50,0.12); border: 1px solid rgba(200,50,50,0.3); color: #e07070; display: block; }
  .msg.success { background: rgba(76,111,201,0.12); border: 1px solid var(--border); color: var(--gold); display: block; }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 1rem;
    margin: 0.5rem 0; color: var(--text-muted); font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* FOOTER */
  footer {
    text-align: center; padding: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.75rem; color: var(--text-muted);
  }
  footer a { color: var(--gold); text-decoration: none; }

  @media (max-width: 480px) {
    .auth-card { padding: 1.8rem 1.4rem; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<nav>
  <a href="Bikes.html" class="logo">MDR <span>Bikes</span></a>
  <a href="Bikes.html" class="nav-back">← Back to Home</a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-badge">MDR Bikes · Member Portal</div>
    <h1 class="auth-title">Welcome <em>Back.</em></h1>
    <p class="auth-sub">Sign in to your account or create a new one.</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-panel" class="form-panel active">
      <div id="login-msg" class="msg"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" placeholder="••••••••" />
          <button class="pw-toggle" type="button" onclick="togglePw('login-password', this)">👁</button>
        </div>
      </div>
      <button class="btn-submit" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div class="divider">or</div>
      <p style="text-align:center; font-size:0.82rem; color:var(--text-muted)">
        Don't have an account? <a href="#" onclick="switchTab('register')" style="color:var(--gold)">Register now</a>
      </p>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-panel" class="form-panel">
      <div id="register-msg" class="msg"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Rahul Sharma" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="reg-phone" placeholder="+91 98765 43210" />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="reg-password" placeholder="Min. 6 characters" />
          <button class="pw-toggle" type="button" onclick="togglePw('reg-password', this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="reg-confirm" placeholder="••••••••" />
          <button class="pw-toggle" type="button" onclick="togglePw('reg-confirm', this)">👁</button>
        </div>
      </div>
      <button class="btn-submit" id="register-btn" onclick="handleRegister()">Create Account</button>
      <p style="text-align:center; font-size:0.82rem; color:var(--text-muted)">
        Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--gold)">Sign in</a>
      </p>
    </div>
  </div>
</main>

<footer>
  © 2025 MDR Bikes · <a href="Bikes.html">Home</a>
</footer>

<script>
  // ── CONFIG ──
  const API = 'https://your-backend.railway.app'; // 🔁 Replace with your Railway backend URL

  // ── TAB SWITCHING ──
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
    );
    document.getElementById('login-panel').classList.toggle('active', tab === 'login');
    document.getElementById('register-panel').classList.toggle('active', tab === 'register');
    clearMsgs();
  }

  function clearMsgs() {
    document.querySelectorAll('.msg').forEach(m => {
      m.className = 'msg'; m.textContent = '';
    });
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
  }

  function togglePw(inputId, btn) {
    const inp = document.getElementById(inputId);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  // ── LOGIN ──
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    if (!email || !password) return showMsg('login-msg', 'Please fill in all fields.', 'error');

    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      localStorage.setItem('mdr_token', data.token);
      localStorage.setItem('mdr_user', JSON.stringify(data.user));

      showMsg('login-msg', 'Welcome back! Redirecting…', 'success');
      setTimeout(() => {
        window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
      }, 900);
    } catch (err) {
      showMsg('login-msg', err.message || 'Login failed. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  // ── REGISTER ──
  async function handleRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    const btn = document.getElementById('register-btn');

    if (!name || !email || !password) return showMsg('register-msg', 'Name, email and password are required.', 'error');
    if (password.length < 6) return showMsg('register-msg', 'Password must be at least 6 characters.', 'error');
    if (password !== confirm) return showMsg('register-msg', 'Passwords do not match.', 'error');

    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, password }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      localStorage.setItem('mdr_token', data.token);
      localStorage.setItem('mdr_user', JSON.stringify(data.user));

      showMsg('register-msg', 'Account created! Redirecting…', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
    } catch (err) {
      showMsg('register-msg', err.message || 'Registration failed. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  // ── ENTER KEY SUPPORT ──
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('login-panel').classList.contains('active');
    if (loginActive) handleLogin(); else handleRegister();
  });

  // ── REDIRECT IF ALREADY LOGGED IN ──
  const existingUser = JSON.parse(localStorage.getItem('mdr_user') || 'null');
  if (existingUser && localStorage.getItem('mdr_token')) {
    window.location.href = existingUser.role === 'admin' ? 'admin.html' : 'dashboard.html';
  }
</script>
</body>
</html>
