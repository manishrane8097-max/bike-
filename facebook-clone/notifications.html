<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Notifications</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <a href="index.html" class="logo">f</a>
            <div class="search-box">
                <input type="text" placeholder="Search Facebook">
                <i class="fas fa-search search-icon"></i>
            </div>
            <div class="header-icons">
                <a href="index.html" class="icon-btn"><i class="fas fa-home"></i></a>
                <a href="friends.html" class="icon-btn"><i class="fas fa-users"></i></a>
                <a href="notifications.html" class="icon-btn active"><i class="fas fa-bell"></i></a>
                <a href="messages.html" class="icon-btn"><i class="fas fa-comment"></i></a>
                <img src="https://via.placeholder.com/40" alt="Profile" class="profile-pic" onclick="window.location.href='profile.html'">
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Left Sidebar (same as main page) -->
        <aside class="left-sidebar">
            <div class="sidebar-menu">
                <a href="profile.html" class="sidebar-item">
                    <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M14.5 12c0-1.1-.9-2-2-2s-2 .9-2 2 .9 2 2 2 2-.9 2-2zm0-6c0-.83-.67-1.5-1.5-1.5S11.5 5.17 11.5 6 12.17 7.5 13 7.5 14.5 6.83 14.5 6zM22 12c0 .3-.02.74-.07 1.14-.18.46-.39.9-.7 1.34l-1.77-1.77c.07-.11.11-.23.11-.36 0-1.1-.9-2-2-2H7.99L9 6H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h8v-6h5c1.1 0 2-.9 2-2v-3.28l-.46-.46L22 12z"/></svg>
                    Profile
                </a>
                <a href="friends.html" class="sidebar-item">
                    <i class="fas fa-users sidebar-icon"></i>
                    Friends
                </a>
                <a href="messages.html" class="sidebar-item">
                    <i class="fas fa-comment sidebar-icon"></i>
                    Messages
                </a>
                <a href="notifications.html" class="sidebar-item active">
                    <i class="fas fa-bell sidebar-icon"></i>
                    Notifications
                </a>
            </div>
        </aside>

        <!-- Middle Content -->
        <main class="middle-content">
            <div class="page-content">
                <div style="display: flex; align-items: center; margin-bottom: 24px;">
                    <i class="fas fa-bell" style="font-size: 24px; color: #1877f2; margin-right: 12px;"></i>
                    <h2 style="font-size: 24px; font-weight: 600;">Notifications</h2>
                </div>
                
                <div class="notification-item">
                    <img src="https://via.placeholder.com/40" alt="John" class="notification-avatar">
                    <div class="notification-content">
                        <div class="notification-text">
                            <strong>John Doe</strong> liked your photo.
                        </div>
                        <div class="notification-time">1h ago</div>
                    </div>
                </div>
                
                <div class="notification-item">
                    <img src="https://via.placeholder.com/40" alt="Sarah" class="notification-avatar">
                    <div class="notification-content">
                        <div class="notification-text">
                            <strong>Sarah Wilson</strong> commented on your post: "Great work!"
                        </div>
                        <div class="notification-time">2h ago</div>
                    </div>
                </div>
                
                <div class="notification-item">
                    <img src="https://via.placeholder.com/40" alt="Mike" class="notification-avatar">
                    <div class="notification-content">
                        <div class="notification-text">
                            <strong>Mike Davis</strong> is now following you.
                        </div>
                        <div class="notification-time">5h ago</div>
                    </div>
                </div>
                
                <div class="notification-item">
                    <img src="https://via.placeholder.com/40" alt="Emily" class="notification-avatar">
                    <div class="notification-content">
                        <div class="notification-text">
                            <strong>Emily Johnson</strong> reacted to your post with 😂.
                        </div>
                        <div class="notification-time">1d ago</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar (same as main page) -->
        <aside class="right-sidebar">
            <div class="contacts-widget">
                <h3 class="widget-title">Contacts</h3>
                <div class="contact-item">
                    <img src="https://via.placeholder.com/36" alt="Contact" class="contact-avatar">
                    <div class="contact-info">
                        <h5>John Smith</h5>
                        <p>Active 2m ago</p>
                    </div>
                </div>
                <!-- More contacts... -->
            </div>
        </aside>
    </div>
</body>
</html>
