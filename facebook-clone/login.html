<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-container">
    <div class="login-box">
        <div class="login-logo">f</div>
        <h2>Connect with friends and the world around you on Facebook.</h2>
        <form>
            <input type="email" class="login-input" placeholder="Email or Phone Number" required>
            <input type="password" class="login-input" placeholder="Password" required>
            <button type="submit" class="login-btn">Log In</button>
        </form>
        <a href="#" style="color: #1877f2; text-decoration: none; font-size: 14px; margin-top: 16px; display: inline-block;">Forgot Password?</a>
        <hr style="margin: 24px 0; border: none; border-top: 1px solid #ddd;">
        <button class="login-btn" style="background: #42b883; margin-top: 12px;">Create New Account</button>
    </div>
</body>
</html>
